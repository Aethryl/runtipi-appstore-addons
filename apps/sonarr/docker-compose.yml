x-runtipi:
  schema_version: 2

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    x-runtipi:
      is_main: true
      internal_port: 8989
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
      SONARR__AUTH__APIKEY: ${SONARR_API_KEY}
      SONARR__AUTH__METHOD: External
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /data:/data
    restart: unless-stopped
