x-runtipi:
  schema_version: 2

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    x-runtipi:
      is_main: true
      internal_port: 8080
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
      WEBUI_PORT: 8080
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /data:/data
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    restart: unless-stopped
