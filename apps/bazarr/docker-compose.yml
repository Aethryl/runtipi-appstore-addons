x-runtipi:
  schema_version: 2

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    x-runtipi:
      is_main: true
      internal_port: 6767
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /data:/data
    restart: unless-stopped
