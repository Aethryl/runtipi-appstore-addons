x-runtipi:
  schema_version: 2

services:
  anime-radarr:
    image: lscr.io/linuxserver/radarr:latest
    x-runtipi:
      is_main: true
      internal_port: 7878
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ}
      RADARR__AUTH__APIKEY: ${ANIME_RADARR_API_KEY}
      RADARR__AUTH__METHOD: External
    volumes:
      - ${APP_DATA_DIR}/data:/config
      - /data:/data
    restart: unless-stopped
